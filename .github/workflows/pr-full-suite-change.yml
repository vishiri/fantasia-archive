# Full integration gate when the PR is labeled visualchange only (updates Storybook VRT baselines in the branch).
# Requires repo labels: novisualchange, visualchange (exact names). Missing or both labels: this guard succeeds (run_heavy=false); ensure nochange owns the failing check. See .github/scripts/pr-label-guard.sh
# Fork PRs: GITHUB_TOKEN may be read-only; label enforcement can fail on public fork workflows — prefer same-repo branches.
name: PR full suite (ensure change)

on:
  pull_request:
    branches:
      - master
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

concurrency:
  group: pr-full-change-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run_heavy: ${{ steps.guard.outputs.run_heavy }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Validate PR labels
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/pr-label-guard.sh change

  full-suite:
    needs: guard
    if: needs.guard.result == 'success' && needs.guard.outputs.run_heavy == 'true'
    # Playwright screenshot baselines in-repo use the win32 suffix (chromium-win32); use Windows to match.
    runs-on: windows-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out the code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.22'
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            .storybook-workspace/yarn.lock

      - name: Install Yarn 1.x
        run: npm install -g yarn@1.22.19

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install Storybook workspace dependencies
        run: yarn --cwd .storybook-workspace install --frozen-lockfile

      - name: Install Playwright Chromium (Electron component and E2E tests)
        run: yarn playwright install chromium --with-deps

      - name: Full ensure change (verify, build, Playwright, Storybook smoke, visual baseline update)
        run: yarn testbatch:ensure:change

      - name: Commit and push updated Storybook snapshots (same-repo PRs only)
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .storybook-workspace/visual-tests/storybook.visual.playwright.test.ts-snapshots
          if git diff --staged --quiet; then
            echo "No Storybook snapshot changes to commit."
          else
            git commit -m "chore: update Storybook visual baselines (CI visualchange)"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${{ github.head_ref }}"
          fi

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}-change
          path: test-results/playwright-report
          if-no-files-found: ignore
